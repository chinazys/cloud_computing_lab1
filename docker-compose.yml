services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass
      POSTGRES_DB: tododb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todouser -d tododb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - todo-network

  backend:
    build:
      context: ./backend
    container_name: backend
    environment:
      DATABASE_URL: postgresql://todouser:todopass@db:5432/tododb
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - todo-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - todo-network

volumes:
  postgres_data:

networks:
  todo-network:
    driver: bridge
